version: 2

project_name: uvoo-hugo-editor

before:
  hooks:
    - npm --prefix editor/web ci
    - npm --prefix editor/web run build

builds:
  - id: uvoo-hugo-editor
    main: ./editor
    binary: uvoo-hugo-editor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - README.md
      - editor/README.md
      - docs/PACKAGE.md
      - packaging/editor.env.example

nfpms:
  - id: linux-packages
    package_name: uvoo-hugo-editor
    vendor: uvoo-hugo
    homepage: https://github.com/uvoo/uvoo-hugo
    maintainer: uvoo-hugo maintainers
    description: Local authenticated editor for Hugo content files.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/user/uvoo-hugo-editor.service
        dst: /usr/lib/systemd/user/uvoo-hugo-editor.service
      - src: packaging/editor.env.example
        dst: /usr/share/doc/uvoo-hugo-editor/editor.env.example
      - src: docs/PACKAGE.md
        dst: /usr/share/doc/uvoo-hugo-editor/PACKAGE.md

checksum:
  name_template: checksums.txt
